steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aerocaliper', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aerocaliper']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aerocaliper-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aerocaliper'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_AGENT_PLATFORM_API_KEY=$_GOOGLE_AGENT_PLATFORM_API_KEY,PHOENIX_API_KEY=$_PHOENIX_API_KEY,GCP_PROJECT_ID=$PROJECT_ID'
      # Note: For hackathon velocity, API keys are passed via env vars. In production, AeroCaliper natively integrates with GCP Secret Manager for credential injection.

images:
  - 'gcr.io/$PROJECT_ID/aerocaliper'

options:
  logging: CLOUD_LOGGING_ONLY
